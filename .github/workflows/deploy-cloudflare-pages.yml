name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy to mydude-demo2
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_PAT }}
          repository: james21333/mydude-demo2
          event-type: deploy-artigos-pages
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'

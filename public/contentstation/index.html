<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Content Station | Clean video</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="Clean video for social posting — watermark removal and light remix.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <header class="site-header">
      <p class="brand">Content Station</p>
      <p class="sub">Clean video for posting</p>
    </header>

    <section id="gate" class="panel" hidden>
      <h1>Sign in</h1>
      <p class="lede">Password-protected station.</p>
      <form id="login-form">
        <label for="password">Station password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button type="submit">Enter</button>
      </form>
      <p id="gate-error" class="error" hidden></p>
    </section>

    <section id="app" hidden>
      <div class="toolbar">
        <p id="session-meta" class="meta"></p>
        <button type="button" id="logout-btn" class="ghost">Log out</button>
      </div>

      <section class="hero-flow">
        <h1>Clean video</h1>
        <p class="lede">Upload a clip, pick what to clean, and download when it’s ready.</p>

        <label for="video-file">Video file</label>
        <input id="video-file" type="file" accept="video/*,.mp4,.mov,.mkv,.avi,.m4v,.webm">

        <p id="file-meta" class="muted-line" hidden></p>

        <fieldset class="options">
          <legend>Options</legend>
          <label class="check">
            <input type="checkbox" id="opt-watermark" checked>
            <span>Remove TikTok watermark</span>
          </label>
          <label class="check">
            <input type="checkbox" id="opt-metadata" checked>
            <span>Clean metadata</span>
          </label>
          <label class="check">
            <input type="checkbox" id="opt-remix">
            <span>Subtle remix</span>
          </label>
          <label class="check">
            <input type="checkbox" id="opt-mirror">
            <span>Mirror video</span>
          </label>
        </fieldset>

        <div class="row">
          <button type="button" id="clean-btn">Clean video</button>
          <button type="button" id="stop-btn" class="ghost" hidden>Stop checking</button>
        </div>

        <p id="status-line" class="status" aria-live="polite">Ready.</p>
        <p id="status-detail" class="muted-line" hidden></p>
        <p id="download-wrap" hidden>
          <a id="download-link" class="btn-link" href="#" target="_blank" rel="noopener">Download cleaned video</a>
        </p>
        <p id="clean-error" class="error" hidden></p>
      </section>
    </section>

    <p class="foot">
      <a href="/">← Artigos hub</a>
    </p>
  </main>
  <script src="./app.js"></script>
</body>
</html>
